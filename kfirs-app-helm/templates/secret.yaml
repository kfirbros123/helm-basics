{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kfirs-app.secretName" . }}
  labels:
    {{- include "kfirs-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when secrets.create=true" .Values.secrets.postgresPassword | quote }}
  APP_PASSWORD_HASH: {{ required "secrets.appPasswordHash is required when secrets.create=true" .Values.secrets.appPasswordHash | quote }}
  FLASK_SECRET_KEY: {{ required "secrets.flaskSecretKey is required when secrets.create=true" .Values.secrets.flaskSecretKey | quote }}
{{- end -}}

